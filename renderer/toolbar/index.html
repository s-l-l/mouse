<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Mouse Spotlight - Toolbar</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="toolbar-inner">
    <!-- Drawing modes -->
    <div class="tool-group">
      <button class="tool-btn active" data-mode="pen" title="画笔 (1)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19l7-7 3 3-7 7-3-3z"/>
          <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
          <path d="M2 2l7.586 7.586"/>
          <circle cx="11" cy="11" r="2"/>
        </svg>
      </button>
      <button class="tool-btn" data-mode="line" title="直线 (2)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="5" y1="19" x2="19" y2="5"/>
          <polyline points="14 5 19 5 19 10" opacity="0.6"/>
        </svg>
      </button>
      <button class="tool-btn" data-mode="rect" title="矩形 (3)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="5" width="16" height="14" rx="1"/>
        </svg>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Color picker -->
    <div class="tool-group">
      <button class="color-btn active" data-color="#FF6B35" style="background:#FF6B35" title="橙色"></button>
      <button class="color-btn" data-color="#E63946" style="background:#E63946" title="红色"></button>
      <button class="color-btn" data-color="#2EC4B6" style="background:#2EC4B6" title="青色"></button>
      <button class="color-btn" data-color="#FFD166" style="background:#FFD166" title="黄色"></button>
      <button class="color-btn" data-color="#FFFFFF" style="background:#FFFFFF" title="白色"></button>
    </div>

    <div class="divider"></div>

    <!-- Line width -->
    <div class="tool-group">
      <button class="width-btn" data-width="3" title="细">
        <span class="width-dot" style="width:6px;height:6px"></span>
      </button>
      <button class="width-btn active" data-width="5" title="中">
        <span class="width-dot" style="width:10px;height:10px"></span>
      </button>
      <button class="width-btn" data-width="8" title="粗">
        <span class="width-dot" style="width:14px;height:14px"></span>
      </button>
    </div>

    <div class="divider"></div>

    <!-- Drawing toggle + clear + exit -->
    <div class="tool-group">
      <button class="tool-btn draw-toggle" id="drawToggle" title="切换绘制 (Insert)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
      <button class="tool-btn action-btn" id="clearBtn" title="清除全部">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
        </svg>
      </button>
      <button class="tool-btn action-btn exit-btn" id="exitBtn" title="退出演示">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="status-row" id="statusRow">
    <span class="status-badge" id="drawingStatus">按 Insert 开始绘制</span>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
